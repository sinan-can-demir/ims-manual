services:

  db:
    image: postgres:15
    container_name: ims_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ims
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ims"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies migrations then exits. `api` waits for this to
  # succeed before starting, instead of racing its own inline `alembic
  # upgrade head` against other workers/replicas at boot.
  migrate:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ims
    command: alembic upgrade head

  api:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: ims_api
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - .:/app:Z
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ims
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data: