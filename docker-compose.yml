services:

  db:
    image: postgres:15
    container_name: ims_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ims
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: ims_api
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - .:/app:Z
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ims
    command: >
      sh -c "
      sleep 3 &&
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

volumes:
  postgres_data: