# Production hardening for a self-hosted deploy. Apply on top of the base
# compose file:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# See docs/deployment/self-hosted.md for the full walkthrough. Requires a
# .env file (copy .env.example) with, at minimum, POSTGRES_PASSWORD and
# API_KEY set — both fail loudly at startup if unset rather than silently
# falling back to an insecure default.

services:
  db:
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-ims}
    # `!override` replaces the base file's list instead of merging into it —
    # plain `ports: []` would NOT remove the base's published port under
    # Compose's default list-merge behavior.
    ports: !override [] # never expose Postgres directly to the internet

  migrate:
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-ims}
    command: alembic upgrade head

  api:
    restart: unless-stopped
    volumes: !override [] # run the built image as-is — no dev-mode source bind-mount
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-ims}
      # Required so /metrics can merge counters across Gunicorn's worker
      # processes — see gunicorn.conf.py and app/core/metrics.py.
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
    # Gunicorn + UvicornWorker instead of the base file's single-worker dev
    # command — real concurrency for production traffic. WEB_CONCURRENCY
    # defaults to 4, tuned for the "1-2 vCPU / 2-4GB RAM" box the deployment
    # guide recommends; override it in .env for a bigger/smaller server
    # (rule of thumb: 2x vCPU cores + 1). Migrations no longer run inline
    # here — the base file's `migrate` service (overridden above with prod
    # credentials) runs once and `api` waits for it via depends_on.
    command: >
      gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers ${WEB_CONCURRENCY:-4} --config gunicorn.conf.py
