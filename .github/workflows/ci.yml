name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ims_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ims_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      # Runs the full suite including @pytest.mark.postgres tests (e.g. the
      # SELECT FOR UPDATE oversell-protection test) against a real Postgres —
      # that path is a silent no-op under SQLite, so this is the only place
      # it's actually exercised.
      - run: make test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: docker build -f docker/Dockerfile .
