name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ims_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ims_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ims_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      # Runs the full suite including @pytest.mark.postgres tests (e.g. the
      # SELECT FOR UPDATE oversell-protection test) against a real Postgres —
      # that path is a silent no-op under SQLite, so this is the only place
      # it's actually exercised.
      - run: make test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: docker build -f docker/Dockerfile .

  # Deploys to AWS on every push to main, once lint/test/docker-build are all
  # green. Uses GitHub OIDC to assume an AWS IAM role — no long-lived AWS
  # keys are stored in this repo. The role, ECS cluster/service, and ECR
  # repo are provisioned separately via Terraform (see infra/README.md);
  # this job only builds+pushes an image and points the ECS service at it.
  # Opt-in: skipped entirely until AWS_DEPLOY_ROLE_ARN is set (i.e. until
  # someone runs the Terraform bootstrap), rather than failing CI.
  deploy:
    needs: [lint, test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.AWS_DEPLOY_ROLE_ARN != ''
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - name: Build and push image
        env:
          IMAGE: ${{ steps.ecr-login.outputs.registry }}/ims-api:sha-${{ github.sha }}
        run: |
          docker build -f docker/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      # Migrations run as a one-off task, registered and run against the new
      # image, and must succeed before the api service is ever updated to
      # that image — replaces the old inline `alembic upgrade head &&` that
      # used to race across concurrent task starts (see
      # infra/ecs.tf's aws_ecs_task_definition.migrate).
      - name: Fetch current migrate task definition
        run: |
          aws ecs describe-task-definition --task-definition ims-migrate \
            --query taskDefinition > migrate-task-def.json

      - uses: aws-actions/amazon-ecs-render-task-definition@v1
        id: render-migrate
        with:
          task-definition: migrate-task-def.json
          container-name: migrate
          image: ${{ steps.ecr-login.outputs.registry }}/ims-api:sha-${{ github.sha }}

      - name: Register migrate task definition revision
        id: register-migrate
        run: |
          CLEANED=$(jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            "${{ steps.render-migrate.outputs.task-definition }}")
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$CLEANED" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Run migration task and wait for completion
        run: |
          NETCFG=$(aws ecs describe-services --cluster ims-cluster --services ims-api-service \
            --query 'services[0].networkConfiguration.awsvpcConfiguration' --output json)
          SUBNETS=$(echo "$NETCFG" | jq -r '.subnets | join(",")')
          SGS=$(echo "$NETCFG" | jq -r '.securityGroups | join(",")')

          TASK_ARN=$(aws ecs run-task \
            --cluster ims-cluster \
            --task-definition "${{ steps.register-migrate.outputs.task_def_arn }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SGS],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: $TASK_ARN"

          aws ecs wait tasks-stopped --cluster ims-cluster --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks --cluster ims-cluster --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "Migration exit code: $EXIT_CODE"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed — aborting before the api service is updated."
            exit 1
          fi

      - name: Fetch current task definition
        run: |
          aws ecs describe-task-definition --task-definition ims-api \
            --query taskDefinition > task-def.json

      - uses: aws-actions/amazon-ecs-render-task-definition@v1
        id: render
        with:
          task-definition: task-def.json
          container-name: api
          image: ${{ steps.ecr-login.outputs.registry }}/ims-api:sha-${{ github.sha }}

      - uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ims-api-service
          cluster: ims-cluster
          wait-for-service-stability: true
