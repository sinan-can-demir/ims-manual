[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = ["migrations"]

[tool.ruff.lint]
# Default ruleset (E/F) plus import sorting and flake8-bandit security
# checks (S). Kept intentionally small otherwise — this is a solo/learning
# project, not enforcing a large style guide.
select = ["E", "F", "I", "S"]

[tool.ruff.lint.per-file-ignores]
# Test-only exemptions — none of these are attacker-reachable:
# S101 (assert) is the standard pytest idiom; S105 (hardcoded secrets) are
# intentional test fixture values; S608 (SQL-looking f-strings) only ever
# embed tmp_path-controlled parquet paths from the test itself.
"tests/**/*.py" = ["S101", "S105", "S608"]
